services:
  # ----------------------------------------------------------------------------
  # 🟢 BACKEND SERVICE (Node.js)
  # ----------------------------------------------------------------------------
  - type: web
    name: movie-in-the-park-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: movie-db
          property: connectionString
      - fromGroup: movie-common-secrets

  # ----------------------------------------------------------------------------
  # 🔵 FRONTEND ADMIN (Next.js - Dashboard)
  # ----------------------------------------------------------------------------
  - type: web
    name: movie-in-the-park-admin
    env: node
    region: frankfurt
    plan: free
    rootDir: frontend-user
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_HOST
        value: https://movie-in-the-park-backend.onrender.com/api

  # ----------------------------------------------------------------------------
  # 🟠 FRONTEND PUBLIC (Next.js - Site Visiteur)
  # ----------------------------------------------------------------------------
  - type: web
    name: movie-in-the-park-public
    env: node
    region: frankfurt
    plan: free
    rootDir: frontend-admin
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://movie-in-the-park-backend.onrender.com/api

# ----------------------------------------------------------------------------
# 🗄️ DATABASE (PostgreSQL)
# ----------------------------------------------------------------------------
databases:
  - name: movie-db
    plan: free
    region: frankfurt

# ----------------------------------------------------------------------------
# 🔑 GROUPES DE SECRETS
# ----------------------------------------------------------------------------
envVarGroups:
  - name: movie-common-secrets
    envVars:
      - key: JWT_SECRET
        value: replace_this_with_a_random_string_at_least_32_chars
      - key: QR_SECRET
        value: replace_this_with_another_random_string
      - key: SENDGRID_API_KEY
        value: SG.placeholder
      - key: ADMIN_NOTIFICATION_EMAIL
        value: latifnjimoluh@gmail.com
      - key: ADMIN_NOTIFICATION_EMAIL_2
        value: matangabrooklyn@gmail.com
